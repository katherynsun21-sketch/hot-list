<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>财经日报 · 五大赛道销售运营洞察</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
  :root {
    --bg: #0b1220;
    --bg2: #121a2e;
    --card: #162038;
    --card2: #1c2846;
    --line: #1f2b45;
    --txt: #e8eefc;
    --muted: #8a9bc4;
    --acc: #5b8cff;
    --acc2: #ffb84d;
    --ok: #48bb78;
    --warn: #ed8936;
    --danger: #e53e3e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: linear-gradient(180deg, var(--bg), var(--bg2));
    color: var(--txt);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", Helvetica, Arial, sans-serif;
    min-height: 100vh;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 24px 20px 60px; }
  header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 18px;
  }
  header h1 {
    font-size: 22px; margin: 0; letter-spacing: 1px;
  }
  header .meta { font-size: 12px; color: var(--muted); }

  /* 整体洞察卡 */
  .insight-overall {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 18px 22px; margin-bottom: 18px;
  }
  .insight-overall .lbl { font-size: 12px; color: var(--acc2); font-weight: 700;
    letter-spacing: 1px; margin-bottom: 8px; }
  .insight-overall p { font-size: 15px; line-height: 1.75; color: var(--txt); margin: 0;}
  .themes { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .themes span {
    background: var(--card2); color: var(--acc); padding: 4px 10px;
    border-radius: 999px; font-size: 12px;
  }

  /* 概览卡 */
  .grid-stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-bottom: 18px;
  }
  .stat {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px 16px;
  }
  .stat .k { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  .stat .v { font-size: 22px; font-weight: 700; margin-top: 4px; color: var(--acc); }

  /* tab */
  .tabs {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;
  }
  .tab {
    padding: 8px 16px; background: var(--card); border: 1px solid var(--line);
    color: var(--muted); border-radius: 999px; cursor: pointer;
    font-size: 14px; user-select: none;
  }
  .tab .badge { background: var(--card2); color: var(--acc); padding: 1px 8px;
    border-radius: 999px; margin-left: 6px; font-size: 11px; font-weight: 700; }
  .tab.on { background: var(--acc); color: #fff; border-color: var(--acc); }
  .tab.on .badge { background: rgba(255,255,255,.2); color: #fff; }

  /* 分赛道德内容 */
  .sec-card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 20px 22px; margin-bottom: 18px;
  }
  .sec-situation {
    font-size: 15px; line-height: 1.8; color: var(--txt);
    background: var(--card2); border-left: 3px solid var(--acc2);
    padding: 12px 14px; border-radius: 8px; margin-bottom: 16px;
  }
  .sec-body { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .sub-h { font-size: 13px; color: var(--acc2); font-weight: 700;
    margin-bottom: 10px; letter-spacing: 1px; }
  .list-row { margin-bottom: 14px; }
  .list-row .sub-h + ul { margin: 0; padding-left: 18px; font-size: 14px; line-height: 1.75; color: var(--txt);}
  .list-row ul li { margin-bottom: 4px; }
  .tag-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    background: var(--card2); color: var(--txt); font-size: 12px;
    padding: 5px 10px; border-radius: 6px; border: 1px solid var(--line);
  }
  .tag.c-danger { border-color: #3b2230; color: #ff8a9f; background: #2a1a24; }
  .tag.c-warn { border-color: #3b3320; color: #ffc983; background: #2a2317; }
  .tag.c-ok { border-color: #1f3b2e; color: #8de0b2; background: #152921; }
  .tag.c-info { border-color: #1f2e4b; color: #9bbfef; background: #15233b; }

  .news { list-style: none; padding: 0; margin: 0; font-size: 13.5px; }
  .news li {
    padding: 8px 10px; margin-bottom: 6px; background: var(--card2);
    border-radius: 8px; border: 1px solid var(--line); line-height: 1.55;
  }
  .news li a { color: var(--txt); text-decoration: none; }
  .news li a:hover { color: var(--acc); text-decoration: underline; }
  .news li .meta { color: var(--muted); font-size: 11px; margin-top: 4px; display: block; }

  .chart-box { background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 16px 20px 12px; margin-bottom: 18px; height: 320px;}
  #cTopic { width: 100%; height: 100%; }
  #wc { width: 100%; height: 220px; }

  .actions-box {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 18px 22px; margin-bottom: 18px;
  }
  .actions-box h3 { margin: 0 0 10px; font-size: 14px; color: var(--acc2); letter-spacing: 1px; }
  .actions-box ol { margin: 0; padding-left: 20px; font-size: 14px; line-height: 1.85; color: var(--txt);}

  .loading, .error { text-align: center; padding: 40px; color: var(--muted);}
  .error { color: var(--danger); }

  @media (max-width: 820px) {
    .sec-body { grid-template-columns: 1fr; }
    .grid-stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>财经日报 · 五大赛道销售运营洞察</h1>
    <div class="meta" id="fetchedAt">—</div>
  </header>

  <div id="app">
    <div class="loading">正在抓取并分析今日财经数据…</div>
  </div>
</div>

<script>
/* ====== 配置：数据来源 URL ====== */
const DATA_URL = "https://katherynsun21-sketch.github.io/financial/data/latest.json";

/* ====== 工具 ====== */
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
const PALETTE = ["#5b8cff","#ffb84d","#48bb78","#ed8936","#e53e3e","#9f7aea","#38b2ac"];
const axisStyle = {
  axisLine:{lineStyle:{color:"#2b3a5e"}},
  axisTick:{show:false},
  axisLabel:{color:"#8a9bc4",fontSize:11},
  splitLine:{lineStyle:{color:"#1f2b45",type:"dashed"}}
};
const charts = [];

/* ====== 全局缓存当前数据，方便点击 tab 后重绘 ====== */
let G = null;

/* ====== 入口 ====== */
async function main(){
  try {
    const res = await fetch(DATA_URL + "?_=" + Date.now(), {cache:"no-store"});
    if (!res.ok) throw new Error("HTTP " + res.status);
    const d = await res.json();
    G = d;
    document.getElementById("fetchedAt").innerHTML =
      "抓取时间：" + esc(d.fetched_at||d.date||"—") +
      "　｜　总新闻数：<b style='color:var(--acc)'>" + (d.total_items||0) + "</b>" +
      "　｜　数据源：" + (d.sources_count||0) + " 个";
    render(d);
  } catch (e) {
    document.getElementById("app").innerHTML =
      "<div class='error'>数据加载失败：" + esc(e.message) +
      "<br/>请确认 " + esc(DATA_URL) + " 可在浏览器直接访问。</div>";
  }
}

function render(d){
  const sa = d.situation_analysis || d.marketing_insights || {};
  const ss = d.sector_summary || {};
  const sectorsArr = Object.keys(sa.sectors || ss).filter(s=>s && s.trim());
  if (!sectorsArr.length){
    document.getElementById("app").innerHTML = "<div class='error'>数据中没有赛道信息。</div>";
    return;
  }

  const overall = sa.overall_situation || "暂无整体局势描述。";
  const themes = sa.core_themes || [];
  const totalItems = d.total_items || 0;
  const totalCount = sectorsArr.reduce((a,s)=>a+(ss[s]?.count||0),0);
  const hot = sectorsArr.slice().sort((a,b)=>(ss[b]?.count||0)-(ss[a]?.count||0))[0];

  document.getElementById("app").innerHTML = `
    <div class="insight-overall">
      <div class="lbl">今日概览</div>
      <p>${esc(overall)}</p>
      ${themes.length?`<div class="themes">核心主题：${themes.map(t=>`<span>${esc(t)}</span>`).join("")}</div>`:""}
    </div>

    <div class="grid-stats">
      <div class="stat"><div class="k">TOTAL NEWS</div><div class="v">${totalItems}</div></div>
      <div class="stat"><div class="k">SECTORS</div><div class="v">${sectorsArr.length}</div></div>
      <div class="stat"><div class="k">HOT SECTOR</div><div class="v">${esc(hot||"—")}</div></div>
      <div class="stat"><div class="k">COVERAGE</div><div class="v">${totalCount}</div></div>
    </div>

    <div class="chart-box"><div class="sub-h" style="margin-bottom:6px">赛道 × 主题 新闻分布</div><div id="cTopic"></div></div>

    <div class="actions-box">
      <h3>🎯 今日销售/运营建议动作</h3>
      <ol>${(sa.sales_today_actions||[]).map(a=>`<li>${esc(a)}</li>`).join("")||"<li>暂无建议动作</li>"}</ol>
    </div>

    <div class="tabs" id="secTabs">
      ${sectorsArr.map((s,i)=>`
        <div class="tab ${i===0?'on':''}" data-s="${esc(s)}">
          ${esc(s)}<span class="badge">${ss[s]?.count||0}</span>
        </div>`).join("")}
    </div>

    <div id="secPanel"></div>
  `;

  document.querySelectorAll("#secTabs .tab").forEach(t=>{
    t.onclick = ()=>{
      document.querySelectorAll("#secTabs .tab").forEach(x=>x.classList.remove("on"));
      t.classList.add("on");
      drawSector(t.dataset.s);
    };
  });

  renderTopicChart(d);
  drawSector(sectorsArr[0]);
}

/* ====== 主题分布图 ====== */
function renderTopicChart(d){
  const ss = d.sector_summary||{};
  const sectors = Object.keys(ss);
  const topicSet = new Set();
  sectors.forEach(s=>Object.keys(ss[s].topic_counts||{}).forEach(t=>topicSet.add(t)));
  const topics = [...topicSet];
  const series = topics.map((t,i)=>({
    name:t, type:"bar", stack:"total", emphasis:{focus:"series"},
    itemStyle:{color:PALETTE[i%PALETTE.length]},
    data: sectors.map(s=>(ss[s].topic_counts||{})[t]||0)
  }));
  const c = echarts.init(document.getElementById("cTopic")); charts.push(c);
  c.setOption({
    tooltip:{trigger:"axis",axisPointer:{type:"shadow"},
      backgroundColor:"#121a2e",borderColor:"#1f2b45",textStyle:{color:"#e8eefc"}},
    legend:{top:0,textStyle:{color:"#8a9bc4"},icon:"roundRect",type:"scroll"},
    grid:{left:46,right:24,top:40,bottom:18},
    xAxis:{type:"category",data:sectors,...axisStyle},
    yAxis:{type:"value",...axisStyle},
    series
  });
  window.addEventListener("resize",()=>charts.forEach(c=>c.resize()));
}

/* ====== 单个赛道面板 ====== */
function drawSector(sector){
  const sa = (G.situation_analysis || G.marketing_insights || {});
  const secInfo = (sa.sectors || {})[sector] || {};
  const ss = (G.sector_summary || {})[sector] || {};
  const bySector = (G.by_sector || {})[sector] || [];

  const insight = secInfo.insight || secInfo.situation || "暂无该赛道局势说明。";
  const advertisers = secInfo.advertisers || secInfo.target_advertisers || secInfo.customer_segments || [];
  const products = secInfo.products || secInfo.key_products || [];
  const contentAngles = secInfo.content_angles || secInfo.suggested_content || [];
  const compliance = secInfo.compliance_points || secInfo.compliance || [];
  const risks = secInfo.risk_factors || secInfo.risks || [];
  const topTitles = ss.top_titles || [];
  const topNews = (bySector.slice ? bySector.slice(0,8) : []).map(n=>({
    title:n.title, url:n.url, source:n.source, topic:n.topic_type
  }));

  const panel = document.getElementById("secPanel");
  panel.innerHTML = `
    <div class="sec-card">
      <div class="sec-situation">${esc(insight)}</div>
      <div class="sec-body">
        <div>
          ${advertisers.length?`
          <div class="list-row">
            <div class="sub-h">👥 重点广告主类型</div>
            <div class="tag-group">${advertisers.map(x=>`<span class="tag c-info">${esc(x)}</span>`).join("")}</div>
          </div>`:""}
          ${products.length?`
          <div class="list-row">
            <div class="sub-h">📦 主推产品 / 服务</div>
            <div class="tag-group">${products.map(x=>`<span class="tag c-ok">${esc(x)}</span>`).join("")}</div>
          </div>`:""}
          ${contentAngles.length?`
          <div class="list-row">
            <div class="sub-h">📝 投放与内容切入点</div>
            <ul>${contentAngles.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>
          </div>`:""}
        </div>
        <div>
          ${compliance.length?`
          <div class="list-row">
            <div class="sub-h">⚠️ 合规关注点</div>
            <ul>${compliance.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>
          </div>`:""}
          ${risks.length?`
          <div class="list-row">
            <div class="sub-h">🚨 投放风险</div>
            <ul>${risks.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>
          </div>`:""}
          ${topNews.length?`
          <div class="list-row">
            <div class="sub-h">📰 今日热点新闻</div>
            <ul class="news">${topNews.map(n=>`<li>${n.url?`<a href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.title)}</a>`:esc(n.title)}<span class="meta">${esc(n.source||"")}${n.topic?`　｜　主题：${esc(n.topic)}`:""}</span></li>`).join("")}</ul>
          </div>`:""}
        </div>
      </div>
    </div>
  `;
}

main();
</script>
</body>
</html>
