<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>金融广告销售 & 运营洞察日报</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
  :root{--bg:#0b1220;--card:#162038;--card2:#1c2846;--line:#1f2b45;--txt:#e8eefc;--muted:#8a9bc4;--acc:#5b8cff;--acc2:#ffb84d}
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,#0b1220,#121a2e);color:var(--txt);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh}
  .wrap{max-width:1200px;margin:0 auto;padding:24px 20px 80px}
  header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px}
  header h1{font-size:22px;margin:0}
  header .meta{font-size:12px;color:var(--muted)}

  /* Hero */
  .hero{background:linear-gradient(135deg,#1a2747,#0f1830);border:1px solid var(--line);border-radius:16px;padding:22px 26px;margin-bottom:18px}
  .hero .tag{display:inline-block;background:#ffb84d22;color:var(--acc2);font-size:12px;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:999px;margin-bottom:10px}
  .hero h2{margin:0 0 8px;font-size:20px}
  .hero p{font-size:15px;line-height:1.8;color:#c7d2ef;margin:0}
  .tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  .tag{background:#24325a;color:#c9d7ff;font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid #2d3d66}
  .tag.ok{background:#1e3a2c;border-color:#2e5a3d;color:#8de0b2}
  .tag.warn{background:#3a2f1a;border-color:#5a4526;color:#ffc983}
  .tag.danger{background:#3a1f2c;border-color:#5a2a3a;color:#ff9eb1}
  .tag.info{background:#1e2f4a;border-color:#2d446e;color:#9bbfef}

  .grid-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .stat .k{font-size:11px;color:var(--muted);letter-spacing:1px}
  .stat .v{font-size:22px;font-weight:700;margin-top:4px;color:var(--acc)}

  .chart-box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 20px 12px;margin-bottom:18px;height:320px}
  #cTopic{width:100%;height:100%}

  .actions-box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 22px;margin-bottom:18px}
  .actions-box h3{margin:0 0 10px;font-size:14px;color:var(--acc2);letter-spacing:1px}
  .actions-box ol{margin:0;padding-left:20px;font-size:14px;line-height:1.9;color:var(--txt)}

  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px 0}
  .tab{padding:8px 16px;background:var(--card);border:1px solid var(--line);color:var(--muted);border-radius:999px;cursor:pointer;font-size:14px;user-select:none}
  .tab .badge{background:var(--card2);color:var(--acc);padding:1px 8px;border-radius:999px;margin-left:6px;font-size:11px;font-weight:700}
  .tab.on{background:var(--acc);color:#fff;border-color:var(--acc)}
  .tab.on .badge{background:rgba(255,255,255,.2);color:#fff}

  .sec-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:18px}
  .sec-head{font-size:15px;line-height:1.85;color:var(--txt);background:linear-gradient(135deg,#1f2e50,#18244a);border-left:3px solid var(--acc2);padding:14px 16px;border-radius:8px;margin-bottom:18px}
  .sec-body{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .block{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:12px}
  .block h4{margin:0 0 10px;font-size:13px;color:var(--acc2);letter-spacing:1px}
  .block ul{margin:0;padding-left:18px;font-size:14px;line-height:1.8;color:var(--txt)}
  .block ul li{margin-bottom:3px 0}
  .block .tag-row{margin-top:0}
  .news-box{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
  .news{list-style:none;padding:0;margin:0;font-size:13.5px}
  .news li{padding:8px 10px;margin-bottom:6px;background:var(--card);border-radius:8px;border:1px solid var(--line);line-height:1.55}
  .news li a{color:var(--txt);text-decoration:none}
  .news li a:hover{color:var(--acc);text-decoration:underline}
  .news li .meta{color:var(--muted);font-size:11px;margin-top:4px;display:block}
  .loading,.error{text-align:center;padding:40px;color:var(--muted)}
  .error{color:#e53e3e}
  @media (max-width:820px){.sec-body{grid-template-columns:1fr}.grid-stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📊 金融广告销售 & 运营洞察日报</h1>
    <div class="meta" id="fetchedAt">—</div>
  </header>
  <div id="app"><div class="loading">正在抓取并分析今日财经数据…</div></div>
</div>

<script>
const DATA_URL = "https://katherynsun21-sketch.github.io/financial/data/latest.json";
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
const PALETTE=["#5b8cff","#ffb84d","#48bb78","#ed8936","#e53e3e","#9f7aea","#38b2ac"];
const axisStyle={axisLine:{lineStyle:{color:"#2b3a5e"}},axisTick:{show:false},axisLabel:{color:"#8a9bc4",fontSize:11},splitLine:{lineStyle:{color:"#1f2b45",type:"dashed"}};
const charts=[];let G=null;async function main(){try{const r=await fetch(DATA_URL+"?_="+Date.now(),{cache:"no-store"});if(!r.ok)throw new Error("HTTP "+r.status);const d=await r.json();G=d;document.getElementById("fetchedAt").innerHTML="抓取时间："+esc(d.fetched_at||d.date||"—")+"　｜　新闻总数：<b style='color:var(--acc)'>"+(d.total_items||0)+"</b>　｜　数据源："+(d.sources_count||0)+" 个";render(d);}catch(e){document.getElementById("app").innerHTML="<div class='error'>数据加载失败："+esc(e.message)+"<br/>请在浏览器直接访问 "+esc(DATA_URL)+"</div>";}}
function render(d){const sa=d.situation_analysis||d.marketing_insights||{};const ss=d.sector_summary||{};const sectorsArr=Object.keys(sa.sectors||ss).filter(s=>s&&s.trim());if(!sectorsArr.length){document.getElementById("app").innerHTML="<div class='error'>数据中无赛道信息</div>";return;}
const overall=sa.overall_situation||"";const themes=sa.core_themes||[];const actions=sa.sales_today_actions||[];const hot=sectorsArr.slice().sort((a,b)=>(ss[b]?.count||0)-(ss[a]?.count||0))[0];document.getElementById("app").innerHTML=`<div class="hero"><span class="tag">销售/运营日报</span><h2>今日金融广告主投放机会洞察</h2><p>${esc(overall)}</p>${themes.length?`<div class="tag-row">${themes.map(t=>`<span class="tag info">${esc(t)}</span>`).join("")}</div>`:""}</div>}<div class="grid-stats"><div class="stat"><div class="k">NEWS</div><div class="v">${d.total_items||0}</div></div><div class="stat"><div class="k">SECTORS</div><div class="v">${sectorsArr.length}</div></div><div class="stat"><div class="k">HOT SECTOR</div><div class="v">${esc(hot||"—")}</div></div><div class="stat"><div class="k">SOURCES</div><div class="v">${d.sources_count||0}</div></div></div>${actions.length?`<div class="actions-box"><h3>🎯 今日销售/运营建议动作</h3><ol>${actions.map(a=>`<li>${esc(a)}</li>`).join("")}</ol></div>`:""}<div class="chart-box"><div style="font-size:13px;color:var(--acc2);font-weight:700;margin-bottom:6px;letter-spacing:1px">赛道 × 主题 新闻分布</div><div id="cTopic"></div></div><div class="tabs" id="secTabs">${sectorsArr.map((s,i)=>`<div class="tab ${i===0?'on':''}" data-s="${esc(s)}">${esc(s)}<span class="badge">${ss[s]?.count||0}</span></div>`).join("")}</div><div id="secPanel"></div>`;document.querySelectorAll("#secTabs .tab").forEach(t=>{t.onclick=()=>{document.querySelectorAll("#secTabs .tab").forEach(x=>x.classList.remove("on"));t.classList.add("on");drawSector(t.dataset.s);}});renderTopicChart(d);drawSector(sectorsArr[0]);}function renderTopicChart(d){const ss=d.sector_summary||{};const sectors=Object.keys(ss);const topicSet=new Set();sectors.forEach(s=>Object.keys(ss[s].topic_counts||{}).forEach(t=>topicSet.add(t)));const topics=[...topicSet];const series=topics.map((t,i)=>({name:t,type:"bar",stack:"total",emphasis:{focus:"series"},itemStyle:{color:PALETTE[i%PALETTE.length]},data:sectors.map(s=>(ss[s].topic_counts||{})[t]||0}));const c=echarts.init(document.getElementById("cTopic"));charts.push(c);c.setOption({tooltip:{trigger:"axis",axisPointer:{type:"shadow"},backgroundColor:"#121a2e",borderColor:"#1f2b45",textStyle:{color:"#e8eefc"}},legend:{top:0,textStyle:{color:"#8a9bc4"},icon:"roundRect",type:"scroll"},grid:{left:46,right:24,top:40,bottom:18},xAxis:{type:"category",data:sectors,...axisStyle},yAxis:{type:"value",...axisStyle},series});window.addEventListener("resize",()=>charts.forEach(c=>c.resize())));function drawSector(sector){const sa=(G.situation_analysis||G.marketing_insights||{};const secInfo=(sa.sectors||{})[sector]||{};const ss=(G.sector_summary||{})[sector]||{};const bySector=(G.by_sector||{})[sector]||[];const insight=secInfo.insight||secInfo.situation||(sector+"赛道今日共 "+(ss.count||0)+" 条相关新闻。建议销售团队结合行业动态梳理素材。";const advertisers=secInfo.advertisers||secInfo.target_advertisers||[];const products=secInfo.products||[];const contentAngles=secInfo.content_angles||[];const compliance=secInfo.compliance_points||[];const risks=secInfo.risk_factors||[];const topNews=(Array.isArray(bySector)?bySector.slice(0,8):[]).map(n=>({title:n.title,url:n.url,source:n.source,topic:n.topic_type}));document.getElementById("secPanel").innerHTML=`<div class="sec-card"><div class="sec-head"><b style="color:var(--acc2)">【${esc(sector)}赛道洞察】</b><br/>${esc(insight)}</div><div class="sec-body"><div>${advertisers.length?`<div class="block"><h4>👥 重点广告主类型</h4><div class="tag-row">${advertisers.map(x=>`<span class="tag info">${esc(x)}</span>`).join("")}</div></div>`:""}${products.length?`<div class="block"><h4>📦 主推产品 / 服务</h4><div class="tag-row">${products.map(x=>`<span class="tag ok">${esc(x)}</span>`).join("")}</div></div>`:""}${contentAngles.length?`<div class="block"><h4>📝 投放与内容切入点</h4><ul>${contentAngles.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div>`:""}</div><div>${compliance.length?`<div class="block"><h4>⚠️ 合规关注点</h4><ul>${compliance.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div>`:""}${risks.length?`<div class="block"><h4>🚨 投放风险</h4><ul>${risks.map(x=>`<li style="color:#ff9eb1">${esc(x)}</li>`).join("")}</ul></div>`:""}${topNews.length?`<div class="news-box"><h4 style="margin:0 0 10px;font-size:13px;color:var(--acc2);letter-spacing:1px">📰 今日热点新闻</h4><ul class="news">${topNews.map(n=>`<li>${n.url?`<a href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.title)}</a>`:esc(n.title)}<span class="meta">${esc(n.source||"")}${n.topic?`　｜　主题：${esc(n.topic)}`:""}</span></li>`).join("")}</ul></div>`:""}</div></div></div>`;}main();
</script>
</body>
</html>
