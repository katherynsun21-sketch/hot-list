<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>金融广告销售 &amp; 运营洞察日报</title>
<style>
  :root {
    --bg: #0f172a;
    --bg-2: #111827;
    --panel: #ffffff;
    --panel-2: #f8fafc;
    --border: #e2e8f0;
    --brand: #2563eb;
    --brand-2: #1e40af;
    --accent: #0ea5e9;
    --success: #16a34a;
    --warn: #d97706;
    --danger: #dc2626;
    --text: #1f2937;
    --text-2: #475569;
    --text-3: #64748b;
    --shadow: 0 1px 2px rgba(15, 23, 42, .04), 0 8px 24px rgba(15, 23, 42, .08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 40%, #ffffff 100%);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }

  /* 顶部 Hero */
  .hero {
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 55%, #0ea5e9 100%);
    color: #fff;
    border-radius: 18px;
    padding: 32px 28px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: "";
    position: absolute;
    right: -40px; top: -40px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,.18), transparent 70%);
  }
  .hero .badge {
    display: inline-block;
    padding: 4px 10px;
    background: rgba(255,255,255,.18);
    border: 1px solid rgba(255,255,255,.3);
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: .04em;
  }
  .hero h1 { margin: 10px 0 6px; font-size: 26px; font-weight: 700; }
  .hero .subtitle { opacity: .9; font-size: 14px; }
  .hero .overall {
    margin-top: 18px;
    padding: 14px 16px;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 12px;
    font-size: 14px;
  }
  .themes {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .themes .chip {
    padding: 4px 10px;
    background: #fff;
    color: var(--brand-2);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }

  /* 统计卡 */
  .stats {
    margin-top: 18px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
  }
  .stat-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    box-shadow: var(--shadow);
  }
  .stat-card .label { font-size: 12px; color: var(--text-3); letter-spacing: .04em; }
  .stat-card .value {
    font-size: 22px;
    font-weight: 700;
    color: var(--brand-2);
    margin-top: 4px;
  }
  .stat-card .sub { color: var(--text-2); font-size: 12px; margin-top: 4px; }

  /* 销售今日动作 */
  .actions-panel {
    margin-top: 24px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .actions-panel h2 { margin: 0 0 10px; font-size: 17px; color: var(--brand-2); }
  .actions-panel ul { margin: 0; padding-left: 18px; color: var(--text); }
  .actions-panel li { margin-bottom: 6px; font-size: 14px; }

  /* Tab */
  .tabs {
    margin-top: 26px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }
  .tab {
    padding: 10px 18px;
    background: #fff;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-2);
    transition: all .15s ease;
  }
  .tab:hover { color: var(--brand-2); }
  .tab.active { background: var(--brand); color: #fff; border-color: var(--brand); }

  .tab-panel {
    display: none;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 0 0 14px 14px;
    padding: 22px;
    box-shadow: var(--shadow);
    animation: fade .2s ease;
  }
  .tab-panel.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .insight-box {
    background: linear-gradient(135deg, #eff6ff, #ecfeff);
    border: 1px solid #bfdbfe;
    border-left: 4px solid var(--brand);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 14px;
    color: #1e3a8a;
    margin-bottom: 18px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1.1fr .9fr;
    gap: 18px;
  }
  @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
  .col h3 {
    font-size: 15px;
    color: var(--brand-2);
    margin: 6px 0 10px;
    border-bottom: 1px dashed var(--border);
    padding-bottom: 6px;
  }

  .list-plain { margin: 0; padding-left: 18px; color: var(--text); }
  .list-plain li { margin-bottom: 6px; font-size: 14px; }

  /* 标签组 */
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip-tag {
    background: #eef2ff;
    color: #3730a3;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    border: 1px solid #c7d2fe;
  }
  .chip-tag.success { background: #ecfdf5; color: #065f46; border-color: #a7f3d0; }
  .chip-tag.warn    { background: #fffbeb; color: #92400e; border-color: #fde68a; }
  .chip-tag.danger  { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
  .chip-tag.info    { background: #f0f9ff; color: #075985; border-color: #bae6fd; }

  /* 新闻列表 */
  .news-section {
    margin-top: 22px;
    border-top: 1px dashed var(--border);
    padding-top: 16px;
  }
  .news-section h3 { font-size: 15px; color: var(--brand-2); margin: 0 0 10px; }
  .news-item {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 14px 10px;
    margin-bottom: 10px;
    background: #fff;
    transition: all .15s ease;
  }
  .news-item:hover { border-color: #93c5fd; box-shadow: 0 4px 14px rgba(37, 99, 235, .08); }
  .news-item .title-row {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
  }
  .news-item a {
    color: #1e3a8a; text-decoration: none; font-weight: 600; font-size: 14px; flex: 1;
  }
  .news-item a:hover { color: var(--brand); text-decoration: underline; }
  .news-item .meta { color: var(--text-3); font-size: 12px; margin-top: 4px; }
  .news-item .suggest-toggle {
    background: var(--brand); color: #fff; border: none; border-radius: 6px;
    padding: 4px 10px; font-size: 12px; cursor: pointer; white-space: nowrap;
  }
  .news-item .suggest-toggle:hover { background: var(--brand-2); }
  .news-item .suggest-body {
    display: none; margin-top: 10px; padding: 10px 12px;
    background: var(--panel-2); border-radius: 8px;
    border: 1px dashed #cbd5e1; font-size: 13px;
  }
  .news-item .suggest-body.open { display: block; }
  .news-item .suggest-body .row { margin-bottom: 6px; color: var(--text); }
  .news-item .suggest-body .row b { color: var(--brand-2); }

  /* 状态条 */
  .footer-meta {
    margin-top: 28px; text-align: center;
    color: var(--text-3); font-size: 12px;
  }
  .loader {
    text-align: center; padding: 60px 20px;
    color: var(--text-3); font-size: 14px;
  }
  .loader .spinner {
    width: 28px; height: 28px;
    border: 3px solid #e2e8f0; border-top-color: var(--brand);
    border-radius: 50%; margin: 0 auto 10px;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 小屏 */
  @media (max-width: 640px) {
    .hero { padding: 24px 20px; }
    .hero h1 { font-size: 20px; }
    .tab { padding: 8px 12px; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="container">
  <div id="root">
    <div class="loader"><div class="spinner"></div>正在加载今日数据…</div>
  </div>
</div>

<script>
  // 数据地址：先尝试本地 data/latest.json，再请求 financial 仓库 Pages 上的 JSON
  const DATA_URLS = [
    "data/latest.json",
    "https://katherynsun21-sketch.github.io/financial/data/latest.json"
  ];

  const SECTORS = ["保险", "银行", "信贷", "财富", "非金"];
  const SECTOR_COLORS = {
    "保险": "success", "银行": "info", "信贷": "warn",
    "财富": "",        "非金": "danger"
  };

  function pick(o, keys, def) {
    for (const k of keys) {
      if (o && o[k] !== undefined && o[k] !== null && o[k] !== "") return o[k];
    }
    return def;
  }
  function toArr(x) { return Array.isArray(x) ? x : (x ? [x] : []); }

  async function fetchData() {
    for (const u of DATA_URLS) {
      try {
        const r = await fetch(u);
        if (r.ok) return await r.json();
      } catch (e) { /* 继续尝试下一个地址 */ }
    }
    throw new Error("无法加载数据");
  }

  function renderHero(d) {
    const sa = d.situation_analysis || {};
    const overall = pick(sa, ["overall_situation"], "暂无整体局势说明");
    const themes = toArr(pick(sa, ["core_themes"], []));
    const total = pick(d, ["total_items"], 0);
    const sectorSummary = pick(d, ["sector_summary"], {});
    const activeSectors = SECTORS.filter(s => (sectorSummary[s] || {}).count > 0).length;
    const srcCount = pick(d, ["sources_count"], 0);
    const fetchedAt = pick(d, ["fetched_at"], "");
    const dateLabel = pick(d, ["date"], "") || (fetchedAt ? fetchedAt.split("T")[0] : "");
    const timeLabel = pick(d, ["time"], "");

    const statCards = [
      { label: "抓取新闻数", value: total, sub: `来自 ${srcCount} 个来源` },
      { label: "覆盖赛道",   value: activeSectors + " / 5", sub: SECTORS.join(" · ") },
      { label: "数据生成",   value: dateLabel.slice(5) || "--", sub: timeLabel || "" },
      { label: "建议动作",   value: (sa.sales_today_actions || []).length, sub: "今日销售/运营 To-Do" },
    ];

    return `
      <div class="hero">
        <span class="badge">📊 商业化金融 · 销售与运营洞察日报</span>
        <h1>金融广告销售 &amp; 运营洞察日报</h1>
        <div class="subtitle">按赛道对当日财经新闻进行分类，并输出对销售/运营可执行的投放建议、合规关注点与风险提示。</div>
        <div class="overall">${overall}</div>
        <div class="themes">
          ${themes.map(t => `<span class="chip"># ${t}</span>`).join("")}
        </div>
      </div>
      <div class="stats">
        ${statCards.map(s => `
          <div class="stat-card">
            <div class="label">${s.label}</div>
            <div class="value">${s.value}</div>
            <div class="sub">${s.sub}</div>
          </div>`).join("")}
      </div>
      <div class="actions-panel">
        <h2>📌 今日销售 / 运营动作建议</h2>
        <ul>${(sa.sales_today_actions || []).map(a => `<li>${a}</li>`).join("") || "<li>暂无动作建议</li>"}</ul>
      </div>
    `;
  }

  function renderTabs(d) {
    const sa = d.situation_analysis || {};
    const sectorsData = pick(sa, ["sectors"], {});
    const bySector = pick(d, ["by_sector"], {});
    const sectorSummary = pick(d, ["sector_summary"], {});

    const tabs = SECTORS.map((s, idx) => {
      const info = sectorsData[s] || {};
      const news = toArr(bySector[s]).slice(0, 40);
      const count = (sectorSummary[s] || {}).count || news.length || 0;
      const insight = pick(info, ["insight", "situation", "summary"], `${s}赛道暂无当日洞察`);
      const advertisers = toArr(pick(info, ["advertisers", "target_advertisers"], []));
      const products = toArr(pick(info, ["products", "main_products"], []));
      const contentAngles = toArr(pick(info, ["content_angles", "suggested_landing"], []));
      const compliance = toArr(pick(info, ["compliance_points", "compliance_notes"], []));
      const risks = toArr(pick(info, ["risk_factors", "risk_notes"], []));

      return `
        <div class="tab-panel ${idx === 0 ? "active" : ""}" data-sector="${s}">
          <div class="insight-box">💡 ${insight}</div>
          <div class="grid-2">
            <div class="col">
              <h3>🎯 重点广告主类型</h3>
              <div class="chip-row">${advertisers.map(x => `<span class="chip-tag ${SECTOR_COLORS[s]}">${x}</span>`).join("") || "<span style='color:#64748b;font-size:13px;'>暂无</span>"}</div>

              <h3 style="margin-top:14px;">💼 主推产品 / 服务</h3>
              <div class="chip-row">${products.map(x => `<span class="chip-tag success">${x}</span>`).join("") || "<span style='color:#64748b;font-size:13px;'>暂无</span>"}</div>

              <h3 style="margin-top:14px;">📝 投放与内容切入点</h3>
              <ul class="list-plain">${contentAngles.map(x => `<li>${x}</li>`).join("") || "<li>暂无</li>"}</ul>
            </div>
            <div class="col">
              <h3>⚠️ 合规关注点</h3>
              <ul class="list-plain">${compliance.map(x => `<li>${x}</li>`).join("") || "<li>暂无</li>"}</ul>

              <h3 style="margin-top:14px;">🚨 投放风险</h3>
              <ul class="list-plain">${risks.map(x => `<li>${x}</li>`).join("") || "<li>暂无</li>"}</ul>

              <h3 style="margin-top:14px;">📈 赛道当日新闻数</h3>
              <div class="chip-row"><span class="chip-tag ${SECTOR_COLORS[s]}">${s} · ${count} 条</span></div>
            </div>
          </div>

          <div class="news-section">
            <h3>📰 ${s}赛道 · 当日新闻（附销售建议 · 点击展开）</h3>
            ${news.length ? news.map((n, i) => renderNewsItem(n, i)).join("")
              : `<div style="color:#64748b;font-size:13px;padding:10px 4px;">该赛道当日暂无直接相关新闻</div>`}
          </div>
        </div>`;
    }).join("");

    return `
      <div class="tabs">
        ${SECTORS.map((s, idx) => {
          const cnt = ((d.sector_summary || {})[s] || {}).count || 0;
          return `<div class="tab ${idx === 0 ? "active" : ""}" data-sector="${s}">${s} <span style="opacity:.75;">(${cnt})</span></div>`;
        }).join("")}
      </div>
      ${tabs}
    `;
  }

  function renderNewsItem(n, idx) {
    const title = n.title || "（无标题）";
    const url = n.url || "#";
    const source = n.source || "";
    const topic = n.topic_type || "一般资讯";
    const confidence = n.confidence || 0;
    const sug = n.item_suggestions || {};
    const sAdvertisers = sug.suggested_advertisers || "";
    const sActions = toArr(sug.suggested_actions);
    const sCompliance = toArr(sug.compliance_notes);
    const sRisks = toArr(sug.risk_notes);

    const isRisk = sRisks.some(x => /违约|逾期|处罚|负面|暴雷|投诉|纠纷|举报/.test(x));
    const isCompliance = sCompliance.some(x => /合规|审查|暂停|处罚/.test(x));

    return `
      <div class="news-item">
        <div class="title-row">
          <a href="${url}" target="_blank" rel="noopener noreferrer">${title}</a>
          <button class="suggest-toggle" onclick="toggleSuggest(this)">展开建议</button>
        </div>
        <div class="meta">
          <span class="chip-tag info" style="margin-right:6px;">${topic}</span>
          ${source ? `<span class="chip-tag" style="margin-right:6px;">${source}</span>` : ""}
          ${confidence ? `<span style="margin-right:8px;">置信度 ${(confidence * 100).toFixed(0)}%</span>` : ""}
          ${isCompliance ? `<span class="chip-tag warn" style="margin-right:6px;">⚠️ 含合规信号</span>` : ""}
          ${isRisk ? `<span class="chip-tag danger">🚨 含风险信号</span>` : ""}
        </div>
        <div class="suggest-body">
          ${sAdvertisers ? `<div class="row"><b>可能感兴趣的广告主：</b>${sAdvertisers}</div>` : ""}
          ${sActions.length ? `<div class="row"><b>销售 / 运营可执行动作：</b></div><ul class="list-plain">${sActions.map(a => `<li>${a}</li>`).join("")}</ul>` : ""}
          ${sCompliance.length ? `<div class="row" style="margin-top:8px;"><b>合规关注点：</b></div><ul class="list-plain">${sCompliance.map(a => `<li>${a}</li>`).join("")}</ul>` : ""}
          ${sRisks.length ? `<div class="row" style="margin-top:8px;"><b>投放风险：</b></div><ul class="list-plain">${sRisks.map(a => `<li>${a}</li>`).join("")}</ul>` : ""}
        </div>
      </div>`;
  }

  window.toggleSuggest = function (btn) {
    const body = btn.closest(".news-item").querySelector(".suggest-body");
    const open = body.classList.toggle("open");
    btn.textContent = open ? "收起建议" : "展开建议";
  };

  function setupTabs() {
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        const sec = tab.dataset.sector;
        document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t === tab));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.dataset.sector === sec));
      });
    });
  }

  async function main() {
    const root = document.getElementById("root");
    try {
      const d = await fetchData();
      const meta = `
        <div class="footer-meta">
          数据来源：东方财富 / 财联社 / 第一财经 / 21财经 / 证券时报 / 每日经济新闻 / 新浪财经 / 央行 / 金融监管总局 / 证监会 / 财政部 / 外汇局 等 ·
          分类方式：关键词规则 + 可扩展 LLM 二次筛选 · 本页仅作为销售与运营内部话题参考
        </div>`;
      root.innerHTML = renderHero(d) + renderTabs(d) + meta;
      setupTabs();
    } catch (e) {
      root.innerHTML = `<div class="loader">⚠️ 数据加载失败：${e.message}<br/><br/>请确认 <code>https://katherynsun21-sketch.github.io/financial/data/latest.json</code> 可访问，并打开浏览器控制台查看详情。</div>`;
    }
  }

  document.addEventListener("DOMContentLoaded", main);
</script>
</body>
</html>
